repos:
  # 1. Standard file formatting checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # 2. Local Pylint execution
  - repo: local
    hooks:
      - id: pylint
        name: Pylint
        entry: pylint
        language: system
        types: [python]
        # Only run Pylint on the specific package directory
        files: ^selenium_utils/
        args:
          - "-rn" # Only display messages
          - "-sn" # Don't display the score
