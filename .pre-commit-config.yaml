repos:
  # 1. Standard file formatting checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # 2. Ruff Linter and Formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      # Run the linter and automatically fix minor issues
      - id: ruff
        args: [ --fix ]
      # Run the Ruff code formatter (replaces Black)
      - id: ruff-format
