name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Select the version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  create_tag:
    name: Create new tag
    #runs-on: ubuntu-latest
    runs-on: [self-hosted, linux]
    permissions:
      actions: write
      contents: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create and push new tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag ${{ inputs.bump_type }}
          git push origin ${{ inputs.bump_type }}
          # Explicitly run our release workflow for this new tag
          gh workflow run lint-tag.yaml --ref ${{ inputs.bump_type }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
