name: CI (Lint & Test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test across all modern, supported Python versions
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - name: Check out the repo
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
        cache: 'pip' # Automatically caches dependencies to speed up runs

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install the local package in editable mode
        pip install -e .
        # Install testing and linting tools
        pip install pylint pytest

    - name: Lint with Pylint
      run: |
        # Run Pylint strictly on your package directory
        pylint selenium_utils

    - name: Run Unit Tests
      run: |
        # If you write pytest unit tests in the future, they will automatically run here
        # pytest tests/
        echo "Testing placeholder!"
